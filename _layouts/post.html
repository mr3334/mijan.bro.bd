---
layout: default
---
<article class="post">
  <h1 class="post-h1">{{ page.title }}</h1>
  <div class="post-meta muted">
    <span>{{ page.date | date: "%b %d, %Y" }}</span>
    <span>•</span>
    <span>{{ content | number_of_words | divided_by: 180 | plus: 1 }} min read</span>
  </div>

  {% if page.tags %}
  <div class="chips" style="margin-top:10px;">
    {% for t in page.tags %}<span class="chip">{{ t }}</span>{% endfor %}
  </div>
  {% endif %}

  {% if page.cover %}
    <img class="post-cover" src="{{ page.cover | relative_url }}" alt="Cover">
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <div class="share">
    <div class="muted small">Share:</div>
    <a class="share-btn" target="_blank" rel="noreferrer"
       href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}">Facebook</a>
    <a class="share-btn" target="_blank" rel="noreferrer"
       href="https://twitter.com/intent/tweet?url={{ site.url }}{{ page.url }}&text={{ page.title }}">X</a>
    <button class="share-btn" type="button" data-copy>Copy link</button>
  </div>
</article>
