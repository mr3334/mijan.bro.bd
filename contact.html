<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact • Mijan Services</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="logo" href="index.html"><span class="logo-mark">M</span><span class="logo-text">Mijan Services</span></a>
      <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="menu" id="menu">
        <a href="index.html">Services</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a class="active pill" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    <h1>Contact</h1>
    <p class="muted">Support info add করো: WhatsApp / Email / Facebook page.</p>

    <div class="contact-grid">
      <div class="page-card">
        <h3>Email us</h3>
        <form class="form" id="contactForm">
          <label>
            Name
            <input id="name" type="text" placeholder="Your name" required />
          </label>
          <label>
            Message
            <textarea id="message" rows="5" placeholder="Write your message..." required></textarea>
          </label>
          <button class="btn primary full" type="submit">Send Email</button>
          <div class="small muted">This opens your email app (no backend).</div>
        </form>
      </div>

      <div class="page-card">
        <h3>Quick links</h3>
        <a class="link" href="#" target="_blank" rel="noreferrer">WhatsApp</a>
        <a class="link" href="#" target="_blank" rel="noreferrer">Facebook Page</a>
        <a class="link" href="mailto:yourmail@example.com">yourmail@example.com</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="muted">© <span id="year"></span> Mijan Services</span>
      <div class="footer-links"><a href="index.html">Services</a><a href="faq.html">FAQ</a></div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
