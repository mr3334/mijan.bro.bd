<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mijan Panel • Add Funds</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html"><span class="brand-mark">M</span><span class="brand-name">mijanpanel.com</span></a>
      <button class="icon-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="nav" id="nav">
        <a href="index.html">Dashboard</a>
        <a href="orders.html">Orders</a>
        <a class="active" href="add-funds.html">Add Funds</a>
        <a class="pill" href="add-funds.html">Deposit</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    <section class="card">
      <div class="order-head">
        <h2>Add Funds</h2>
        <p class="muted small">Demo UI. Later you can connect payment gateway.</p>
      </div>

      <div class="order-grid">
        <div class="field full">
          <label>Payment Method</label>
          <select>
            <option>bKash</option>
            <option>Nagad</option>
            <option>Card</option>
          </select>
        </div>

        <div class="field full">
          <label>Amount (BDT)</label>
          <input type="number" min="10" placeholder="e.g. 500" />
        </div>

        <div class="field full">
          <button class="btn primary">Proceed</button>
          <div class="small muted">You can replace this with real payment flow later.</div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
